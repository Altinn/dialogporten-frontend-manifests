# Linkerd inbound authorization for arbeidsflate pods (port 80).
#
# The cluster runs `defaultInboundPolicy: deny`, so this Server's port is
# default-deny. Two ways in are authorized:
#   1. Mesh (mTLS) identity — internal arbeidsflate components (frontend, bff)
#      and traefik ingress. This is how all real traffic arrives.
#   2. The kubelet, for liveness/readiness probes (frontend `/`, bff
#      `/api/liveness` + `/api/readiness`), which hit port 80 directly and are
#      unmeshed. Scoped to the node subnet — on dis-core clusters the nodes
#      live in 10.205.0.0/16 (+ fd12:2291:d70a::/48), deliberately NOT the pod
#      subnet (10.240.0.0/16 / fd10:…), so pods cannot bypass mesh auth via the
#      network rule. Tighten to the per-cluster /20 in an overlay for stricter
#      isolation if wanted.
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: arbeidsflate-http
  labels:
    app.kubernetes.io/part-of: arbeidsflate
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: arbeidsflate
  port: 80
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: arbeidsflate-mesh-authn
  labels:
    app.kubernetes.io/part-of: arbeidsflate
spec:
  identities:
    # Internal arbeidsflate components (frontend, bff).
    - "*.product-arbeidsflate.serviceaccount.identity.linkerd.cluster.local"
    # Ingress — covers all external traffic, which reaches us via traefik.
    - "altinn-traefik.traefik.serviceaccount.identity.linkerd.cluster.local"
---
apiVersion: policy.linkerd.io/v1alpha1
kind: NetworkAuthentication
metadata:
  name: arbeidsflate-kubelet
  labels:
    app.kubernetes.io/part-of: arbeidsflate
spec:
  # Node subnet (kubelet source) for health probes — excludes the pod subnet.
  networks:
    - cidr: 10.205.0.0/16
    - cidr: fd12:2291:d70a::/48
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: arbeidsflate-allow-meshed
  labels:
    app.kubernetes.io/part-of: arbeidsflate
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: arbeidsflate-http
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: arbeidsflate-mesh-authn
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: arbeidsflate-allow-kubelet
  labels:
    app.kubernetes.io/part-of: arbeidsflate
spec:
  targetRef:
    group: policy.linkerd.io
    kind: Server
    name: arbeidsflate-http
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: NetworkAuthentication
      name: arbeidsflate-kubelet
