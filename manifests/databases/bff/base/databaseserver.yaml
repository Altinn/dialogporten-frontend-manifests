apiVersion: storage.dis.altinn.cloud/v1alpha1
kind: DatabaseServer
metadata:
  name: bff
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: arbeidsflate
spec:
  mode: Dedicated
  version: 17
  auth:
    admin:
      identity:
        identityRef:
          name: bff-db-admin
  enableExtensions:
    - pg_stat_statements
  serverType: dev
  storage:
    sizeGB: 32
  highAvailabilityEnabled: false
  backupRetentionDays: 14
