apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - path: database-patch.yaml
  - target:
      kind: DatabaseServer
      name: bff
    patch: |-
      - op: replace
        path: /metadata/name
        value: arbeidsflate-bff-at23
  - target:
      kind: Database
      name: bff
    patch: |-
      - op: replace
        path: /spec/server/name
        value: arbeidsflate-bff-at23
