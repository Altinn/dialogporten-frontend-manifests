apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: arbeidsflate
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: arbeidsflate
        azure.workload.identity/use: "true"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: ghcr.io/altinn/dialogporten-frontend-frontend:set-by-ci
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: frontend-runtime
          env:
            - name: NODE_ENV
              value: production
            - name: APPLICATION_INSIGHTS_DISABLE_DEPENDENCY_TRACKING
              value: "true"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-runtime
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: arbeidsflate
data:
  DIALOGPORTEN_STREAM_URL: set-by-env
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: arbeidsflate
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: arbeidsflate
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: frontend
          port: 80
      filters:
        - requestHeaderModifier:
            set:
              - name: l5d-dst-override
                value: frontend.product-arbeidsflate.svc.cluster.local:80
          type: RequestHeaderModifier
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: arbeidsflate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  maxReplicas: 3
---
apiVersion: application.dis.altinn.cloud/v1alpha1
kind: ApplicationIdentity
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: arbeidsflate
spec: {}
