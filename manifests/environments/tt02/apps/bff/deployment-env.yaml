apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
spec:
  template:
    spec:
      containers:
        - name: bff
          env:
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "0.05"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-runtime
  labels:
    app.kubernetes.io/instance: tt02
data:
  HOSTNAME: https://af.tt02.altinn.no
  OIDC_URL: test.idporten.no
  OIDC_PLATFORM_URL: platform.tt02.altinn.no/authentication/api/v1/openid
  DIALOGPORTEN_URL: https://altinn-tt02-api.azure-api.net/dialogporten
  ENABLE_GRAPHIQL: "true"
  PLATFORM_BASEURL: https://platform.tt02.altinn.no
  AUTH_CONTEXT_COOKIE_DOMAIN: .tt02.altinn.no
  ALTINN2_BASE_URL: https://tt02.altinn.no
