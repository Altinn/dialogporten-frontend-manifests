apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
spec:
  template:
    spec:
      containers:
        - name: bff
          env:
            - name: DB_USE_AAD_AUTH
              value: "true"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: bff-db-runtime
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bff-db-runtime
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: bff-db-runtime
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: bff-db-runtime
                  key: DB_USER
