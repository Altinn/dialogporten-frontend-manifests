name: Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate kustomize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate kustomize structure
        shell: bash
        run: |
          set -euo pipefail

          for dir in ./manifests/environments/*/; do
            env=$(basename "$dir")
            if [ ! -f "./manifests/environments/${env}/kustomization.yaml" ]; then
              echo "Error: Missing ./manifests/environments/${env}/kustomization.yaml"
              exit 1
            fi
          done

          for dir in ./manifests/apps/*/ ./manifests/jobs/*/; do
            if [ ! -f "${dir}base/kustomization.yaml" ]; then
              echo "Error: Missing ${dir}base/kustomization.yaml"
              exit 1
            fi
          done

          if grep -R --include='kustomization.yaml' -n 'patchesStrategicMerge' ./manifests/environments; then
            echo "Error: Found deprecated patchesStrategicMerge usage."
            exit 1
          fi

  check-base:
    name: Check if base branch has manifests
    runs-on: ubuntu-latest
    outputs:
      has-manifests: ${{ steps.check.outputs.has-manifests }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Check for manifests
        id: check
        shell: bash
        run: |
          if [ -d "manifests/environments" ] && [ -n "$(ls -A manifests/environments 2>/dev/null)" ]; then
            echo "has-manifests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-manifests=false" >> "$GITHUB_OUTPUT"
            echo "Base branch has no manifests — skipping kustomize-diff (initial bootstrap PR)."
          fi

  kustomize-diff:
    needs: check-base
    if: needs.check-base.outputs.has-manifests == 'true'
    uses: dis-way/actions/.github/workflows/kustomize-diff.yml@87a3c5e6a95eb24448d8bf4884ea2fcd9b9c0ced # main
    with:
      build-paths: "manifests/environments/*,flux/syncroot/*"
    permissions:
      contents: read
      pull-requests: write
